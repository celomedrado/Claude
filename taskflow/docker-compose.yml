services:
  taskflow:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - taskflow-data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
    restart: unless-stopped

volumes:
  taskflow-data:
